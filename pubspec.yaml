name: dio_auto_pilot
description: A Dio wrapper that adds automatic exponential-backoff retries and pluggable auth/token-refresh interceptors.
version: 0.1.0
homepage: https://github.com/hrikhan/dio_auto_pilot
repository: https://github.com/hrikhan/dio_auto_pilot

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0

topics:
  - dio
  - networking
  - http
